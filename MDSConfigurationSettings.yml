  servers: ["root@172.21.13.12", "root@172.21.13.13", "root@172.21.13.14"]
  clients: ["root@172.21.13.11"]

fs_name: "perf_test_fs"
num_filesystems: 1
mds_yaml_path: "/sfs2020/mds.yaml" # Contains 'service_type: mds' spec

