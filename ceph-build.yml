- name: Build Ceph from source
  hosts: ganeshas
  become: true
  vars:
    git_base_dir: "{{ ansible_env.HOME }}/git"
    ceph_repo_url: "https://github.com/edwinzrodriguez/ceph.git"
    ceph_dest_name: "ceph-tentacle"
    ceph_version: "ceph-bench-tentacle"
    ceph_install_prefix: "/usr/local"
    ganesha_repo_url: "https://github.com/edwinzrodriguez/nfs-ganesha.git"
    ganesha_dest_name: "nfs-ganesha"
    ganesha_version: "V9.7"
    ganesha_build_dir: "ganesha-build"
    ganesha_install_prefix: "/usr/local"
  tasks:
    - name: Remove existing ceph packages
      ansible.builtin.dnf:
        name: "*ceph*"
        state: absent
      ignore_errors: yes

    - name: Install Development Tools group
      ansible.builtin.dnf:
        name: "@Development Tools"
        state: present

    - name: Create git directory
      ansible.builtin.file:
        path: "{{ git_base_dir }}"
        state: directory
        mode: '0755'
      become: false

    - name: Clone Ceph repository (tentacle branch)
      ansible.builtin.git:
        repo: "{{ ceph_repo_url }}"
        dest: "{{ git_base_dir }}/{{ ceph_dest_name }}"
        version: "{{ ceph_version }}"
        single_branch: yes
        recursive: yes
      become: false

    - name: Run install-deps.sh
      ansible.builtin.command:
        cmd: ./install-deps.sh
        chdir: "{{ git_base_dir }}/{{ ceph_dest_name }}"
      environment:
        # Some versions of install-deps.sh might need non-interactive flags or sudo
        SUDO: "sudo"

    - name: Install additional development dependencies
      ansible.builtin.dnf:
        name:
          - boost-random
          - nss-devel
          - keyutils-libs-devel
          - libatomic
          - libibverbs-devel
          - librdmacm-devel
          - ninja-build
          - openldap-devel
          - numactl-devel
          - krb5-devel
          - openssl-devel
          - CUnit-devel
          - python3-devel
          - python3-prettytable
          - python3-pyyaml
          - python3-sphinx
          - lz4-devel
          - rdma-core-devel
          - systemd-devel
          - libblkid-devel
          - libaio-devel
          - cryptsetup-devel
          - libnbd-devel
          - libcurl-devel
          - libcap-devel
          - libcap-ng-devel
          - fmt-devel
          - "pkgconfig(libudev)"
          - libnl3-devel
          - liboath-devel
          - libtool
          - libxml2-devel
          - make
          - ncurses-devel
          - libicu-devel
          - patch
          - perl
          - pkgconfig
          - procps
          - python3
          - python3-setuptools
          - python3-Cython
          - snappy-devel
          - sqlite-devel
          - "pkgconfig(udev)"
          - valgrind-devel
          - which
          - xfsprogs-devel
          - xmlstarlet
          - nasm
          - lua-devel
          - lmdb-devel
          - expat-devel
          - gperftools-devel
          - lttng-ust-devel
          - libbabeltrace-devel
          - thrift-devel
          - gperf
          - librabbitmq-devel
          - librdkafka-devel
        state: present

    - name: Run do_cmake.sh
      ansible.builtin.command:
        cmd: "./do_cmake.sh -DCMAKE_INSTALL_PREFIX={{ ceph_install_prefix }} -DCMAKE_BUILD_TYPE=RelWithDebInfo"
        chdir: "{{ git_base_dir }}/{{ ceph_dest_name }}"
      become: false

    - name: Build with ninja
      ansible.builtin.command:
        cmd: ninja
        chdir: "{{ git_base_dir }}/{{ ceph_dest_name }}/build"
      become: false

    - name: Install with ninja
      ansible.builtin.command:
        cmd: ninja install
        chdir: "{{ git_base_dir }}/{{ ceph_dest_name }}/build"

    - name: Install Ganesha development dependencies
      ansible.builtin.dnf:
        name:
          - libacl-devel
          - libnsl2-devel
        state: present

    - name: Clone NFS-Ganesha repository (V9.7 branch)
      ansible.builtin.git:
        repo: "{{ ganesha_repo_url }}"
        dest: "{{ git_base_dir }}/{{ ganesha_dest_name }}"
        version: "{{ ganesha_version }}"
        single_branch: yes
        recursive: yes
      become: false

    - name: Update Ganesha submodules
      ansible.builtin.command:
        cmd: git submodule update --init --recursive
        chdir: "{{ git_base_dir }}/{{ ganesha_dest_name }}"
      become: false

    - name: Create Ganesha build directory
      ansible.builtin.file:
        path: "{{ git_base_dir }}/{{ ganesha_build_dir }}"
        state: directory
        mode: '0755'
      become: false

    - name: Run cmake for NFS-Ganesha
      ansible.builtin.command:
        cmd: "cmake -GNinja -DUSE_FSAL_CEPH=true -DCEPHFS_INCLUDE_DIR={{ ceph_install_prefix }}/ceph/include -DCEPHFS_LIBRARY_DIR={{ ceph_install_prefix }}/ceph/lib64 -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX={{ ganesha_install_prefix }} ../{{ ganesha_dest_name }}/src"
        chdir: "{{ git_base_dir }}/{{ ganesha_build_dir }}"
      become: false

    - name: Build Ganesha with ninja
      ansible.builtin.command:
        cmd: ninja
        chdir: "{{ git_base_dir }}/{{ ganesha_build_dir }}"
      become: false

    - name: Install Ganesha with ninja
      ansible.builtin.command:
        cmd: ninja install
        chdir: "{{ git_base_dir }}/{{ ganesha_build_dir }}"

    - name: Create nfs-ganesha systemd service file
      ansible.builtin.copy:
        dest: /etc/systemd/system/nfs-ganesha.service
        content: |
          [Unit]
          Description=NFS-Ganesha-Server
          After=network.target

          [Service]
          Type=forking
          ExecStart={{ ganesha_install_prefix }}/bin/ganesha.nfsd -f {{ ganesha_install_prefix }}/etc/ganesha/ganesha.conf -L /var/log/ganesha.log
          ExecReload=/bin/kill -HUP $MAINPID
          PIDFile=/var/run/ganesha.pid

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable nfs-ganesha service
      ansible.builtin.systemd:
        name: nfs-ganesha
        enabled: yes
        state: started
