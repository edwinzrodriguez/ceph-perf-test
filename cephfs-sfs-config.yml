- hosts: all
  become: true
  vars:
    debuginfo_repo_name: "{{ 'baseos-debuginfo' if ansible_distribution == 'CentOS' else 'baseos-debug-rpms' if ansible_distribution == 'RedHat' else 'baseos-debuginfo' }}"
    crb_debuginfo_repo_name: "{{ 'crb-debuginfo' if ansible_distribution == 'CentOS' else 'codeready-builder-for-rhel-' ~ ansible_distribution_major_version ~ '-x86_64-debug-rpms' if ansible_distribution == 'RedHat' else 'crb-debuginfo' }}"
  tasks:
    - name: Disable SELinux
      ansible.posix.selinux:
        state: disabled
      ignore_errors: yes

    # controls whether the kernel will randomize the virtual memory addresses of processes
    - name: Disable kernel ASLR
      ansible.posix.sysctl:
        name: kernel.randomize_va_space
        value: '0'
        state: present
        reload: yes

    # controls whether restrictions are placed on exposing kernel memory addresses
    # via /proc and other interfaces,
    - name: Set kptr_restrict to 0
      ansible.posix.sysctl:
        name: kernel.kptr_restrict
        value: '0'
        state: present
        reload: yes

    # controls the use of the Linux performance events system by unprivileged users
    # (those without CAP_SYS_ADMIN)
    - name: Set perf_event_paranoid to -1
      ansible.posix.sysctl:
        name: kernel.perf_event_paranoid
        value: '-1'
        state: present
        reload: yes

    # controls the maximum amount of memory that can be locked by a process
    - name: Set perf_event_mlock_kb to 2048
      ansible.posix.sysctl:
        name: kernel.perf_event_mlock_kb
        value: '2048'
        state: present
        reload: yes

    # controls whether the kernel will allow a process to ptrace() another process
    # (useful for debugging and security)
    - name: Set yama.ptrace_scope to 0
      ansible.posix.sysctl:
        name: kernel.yama.ptrace_scope
        value: '0'
        state: present
        reload: yes

    # controls whether the kernel will allow a process to send a signal to itself
    # (useful for security and preventing accidental signal sending)
    - name: Set nmi_watchdog to 0
      ansible.posix.sysctl:
        name: kernel.nmi_watchdog
        value: '0'
        state: present
        reload: yes
      ignore_errors: yes
      when: not (ansible_distribution == 'CentOS' and ansible_distribution_major_version | int == 10)

    # controls the maximum number of stack frames that can be recorded for a perf event
    # (useful for debugging and performance analysis)
    - name: Set perf_event_max_stack to 255
      ansible.posix.sysctl:
        name: kernel.perf_event_max_stack
        value: '255'
        state: present
        reload: yes

    - name: Read netmist.env
      ansible.builtin.shell:
        cmd: "grep '^sfs2020_archive=' netmist.env | cut -d'=' -f2 | tr -d '\"' | tr -d \"'\""
      delegate_to: localhost
      register: netmist_env_content
      run_once: true

    - name: Set sfs2020_archive fact
      ansible.builtin.set_fact:
        sfs2020_archive: "{{ netmist_env_content.stdout }}"

    - name: Ensure config-manager is available
      ansible.builtin.dnf:
        name: 'dnf-command(config-manager)'
        state: present
        update_cache: yes

    - name: Check if debuginfo repository is already enabled
      ansible.builtin.shell:
        cmd: dnf repolist enabled | grep -q "{{ debuginfo_repo_name }}"
      register: debuginfo_enabled
      failed_when: false
      changed_when: false

    - name: Enable debuginfo repository
      ansible.builtin.shell:
        cmd: dnf config-manager --set-enabled "{{ debuginfo_repo_name }}"
      when: debuginfo_enabled.rc != 0
      ignore_errors: yes

    - name: Check if CRB debuginfo repository is already enabled
      ansible.builtin.shell:
        cmd: dnf repolist enabled | grep -q "{{ crb_debuginfo_repo_name }}"
      register: crb_debuginfo_enabled
      failed_when: false
      changed_when: false

    - name: Enable CRB debuginfo repository
      ansible.builtin.shell:
        cmd: dnf config-manager --set-enabled "{{ crb_debuginfo_repo_name }}"
      when: crb_debuginfo_enabled.rc != 0
      ignore_errors: yes

    - name: Clean DNF cache
      ansible.builtin.command:
        cmd: dnf clean all

    - name: Update all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_distribution in ['CentOS', 'RedHat', 'Rocky']

#    - name: Autoremove unneeded packages installed as dependencies
#      ansible.builtin.dnf:
#        autoremove: yes
#      when: ansible_distribution == 'CentOS' or ansible_distribution == 'RedHat'

    - name: Install systemtap and related packages
      ansible.builtin.dnf:
        name:
          - systemtap
          - systemtap-runtime
          - kernel-debuginfo
          - kernel-devel
          - kernel-debuginfo-common-x86_64
        enablerepo:
          - "{{ debuginfo_repo_name }}"
          - "{{ crb_debuginfo_repo_name }}"
        state: present
        update_cache: yes
      when: ansible_distribution_major_version | int >= 9

    - name: Run stap-prep
      ansible.builtin.shell:
        cmd: "stap-prep"
      environment:
        STAP_REPO_OPTIONS: "--enablerepo={{ debuginfo_repo_name }},{{ crb_debuginfo_repo_name }}"
      ignore_errors: yes
      when: ansible_distribution_major_version | int >= 9

    - name: Install perf tools
      ansible.builtin.dnf:
        name: "perf"
        state: latest

    - name: Create perf_users group
      ansible.builtin.group:
        name: perf_users
        state: present

    - name: Set group ownership of perf binary
      ansible.builtin.file:
        path: /usr/bin/perf
        group: perf_users

    - name: Set capabilities on perf binary
      community.general.capabilities:
        path: /usr/bin/perf
        capability: cap_perfmon,cap_sys_ptrace,cap_syslog=ep
        state: present

    - name: Install fio
      ansible.builtin.dnf:
        name: "fio"
        state: latest

    - name: Install iperf3
      ansible.builtin.dnf:
        name: "iperf3"
        state: latest

    - name: Install sysstat
      ansible.builtin.dnf:
        name: "sysstat"
        state: latest

    - name: Install network tools
      ansible.builtin.dnf:
        name:
          - net-tools
          - telnet
          - lsof
        state: latest

    - name: Install perl-open.noarch
      ansible.builtin.dnf:
        name: "perl-open.noarch"
        state: latest

    - name: Install tuned-adm tools
      ansible.builtin.dnf:
        name: "tuned"
        state: latest

- hosts: mons osds mdss clients ganeshas
  become: true
  tasks:
    - name: Ensure EPEL and CRB are enabled
      ansible.builtin.shell:
        cmd: |
          dnf install -y epel-release
          # Exclude conflicting packages from EPEL
          if [ -f /etc/yum.repos.d/epel.repo ]; then
            # Clean up existing exclude lines from the [epel] section to avoid DuplicateOptionError
            sed -i '/^\[epel\]/,/^\[/ { /^exclude=/ d }' /etc/yum.repos.d/epel.repo
            # Add the exclude line after [epel] section header
            sed -i '/^\[epel\]/a exclude=python3-grpcio*,grpc-data*,re2*,parquet-libs*,libarrow*,thrift*' /etc/yum.repos.d/epel.repo
          fi
          if [ -f /etc/yum.repos.d/epel-next.repo ]; then
            # Clean up existing exclude lines from the [epel-next] section
            sed -i '/^\[epel-next\]/,/^\[/ { /^exclude=/ d }' /etc/yum.repos.d/epel-next.repo
            # Add the exclude line after [epel-next] section header
            sed -i '/^\[epel-next\]/a exclude=python3-grpcio*,grpc-data*,re2*,parquet-libs*,libarrow*,thrift*' /etc/yum.repos.d/epel-next.repo
          fi

          if [ "{{ ansible_distribution }}" = "RedHat" ]; then
            dnf config-manager --set-enabled codeready-builder-for-rhel-{{ ansible_distribution_major_version }}-x86_64-rpms
          elif [ "{{ ansible_distribution }}" = "Rocky" ]; then
            dnf config-manager --set-enabled crb
          else
            dnf config-manager --set-enabled crb
          fi
      ignore_errors: yes

    - name: Install SPECstorage2020 dependencies (DNF)
      ansible.builtin.dnf:
        name:
          - python3-matplotlib
          - python3-dateutil
          - python3-numpy
          - python3-pyparsing
          - python3-six
          - python3-scipy
          - python3-openpyxl
          - python3-xlsxwriter
          - python3-cycler
          - python3-pyyaml
          - python3-pip
        state: present
        update_cache: yes

    - name: Install python3-pandas (DNF)
      ansible.builtin.dnf:
        name: python3-pandas
        state: present
      ignore_errors: yes
      register: pandas_dnf

    - name: Install python3-pandas (PIP fallback)
      ansible.builtin.pip:
        name: pandas
        executable: pip3
        state: present
      when: pandas_dnf is failed

    - name: Create /cephfs_perf directory
      ansible.builtin.file:
        path: /cephfs_perf
        state: directory
        mode: '0755'

    - name: Create /cephfs_perf/sfs2020 directory
      ansible.builtin.file:
        path: /cephfs_perf/sfs2020
        state: directory
        mode: '0755'

    - name: Copy SFS2020 archive to /cephfs_perf/sfs2020
      ansible.builtin.copy:
        src: "{{ sfs2020_archive }}"
        dest: "/cephfs_perf/sfs2020/{{ sfs2020_archive | basename }}"
        mode: '0644'

    - name: Install git
      ansible.builtin.dnf:
        name: git
        state: present

    - name: Clone FlameGraph repository
      ansible.builtin.git:
        repo: https://github.com/brendangregg/FlameGraph.git
        dest: /cephfs_perf/FlameGraph
        clone: yes
        update: yes

    - name: Untar SPECstorage2020
      ansible.builtin.unarchive:
        src: "/cephfs_perf/sfs2020/{{ sfs2020_archive | basename }}"
        dest: /cephfs_perf/sfs2020/
        remote_src: true
        extra_opts: "{{ ['--gzip'] if sfs2020_archive.endswith('.tgz') or sfs2020_archive.endswith('.tar.gz') else [] }}"

    - name: Run SM2020 install
      ansible.builtin.shell:
        cmd: cd /cephfs_perf/sfs2020/SPECstorage2020 && python3 SM2020 --install-dir=/SPEC2020
      ignore_errors: yes

    - name: Install pyupgrade
      ansible.builtin.shell:
        cmd: sudo pip3 install pyupgrade

    - name: Run pyupgrade on SM2020
      ansible.builtin.shell:
        cmd: pyupgrade --py3-plus /SPEC2020/SM2020
      ignore_errors: yes
      when: not (ansible_distribution == "RedHat" and ansible_distribution_major_version | int >= 9)

- hosts: mons
  become: true
  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Determine if firewalld is running
      ansible.builtin.set_fact:
        firewalld_running: "{{ 'firewalld.service' in ansible_facts.services and ansible_facts.services['firewalld.service'].state == 'running' }}"

    - name: Determine if iptables is running
      ansible.builtin.set_fact:
        iptables_running: "{{ 'iptables.service' in ansible_facts.services and ansible_facts.services['iptables.service'].state == 'running' }}"

    - name: Query firewalld for port range 5000-6000/tcp
      ansible.builtin.command: firewall-cmd --query-port=5000-6000/tcp
      register: fw_query
      failed_when: false
      changed_when: false
      when: firewalld_running | default(false)

    - name: Allow TCP port range 5000-6000 via firewalld (permanent)
      ansible.builtin.command: firewall-cmd --add-port=5000-6000/tcp --permanent
      when:
        - firewalld_running | default(false)
        - fw_query.rc is defined and fw_query.rc != 0

    - name: Reload firewalld after adding port range 5000-6000
      ansible.builtin.command: firewall-cmd --reload
      when:
        - firewalld_running | default(false)
        - fw_query.rc is defined and fw_query.rc != 0

    - name: Check if iptables already allows 5000-6000/tcp
      ansible.builtin.command: iptables -C INPUT -p tcp --dport 5000:6000 -j ACCEPT
      register: ipt_check
      failed_when: false
      changed_when: false
      when: iptables_running | default(false)

    - name: Add iptables rule to allow 5000-6000/tcp
      ansible.builtin.command: iptables -I INPUT -p tcp --dport 5000:6000 -j ACCEPT
      when:
        - iptables_running | default(false)
        - ipt_check.rc is defined and ipt_check.rc != 0

    - name: Persist iptables rules (best-effort)
      ansible.builtin.shell: iptables-save > /etc/sysconfig/iptables
      when:
        - iptables_running | default(false)
        - ipt_check.rc is defined and ipt_check.rc != 0
      ignore_errors: yes
